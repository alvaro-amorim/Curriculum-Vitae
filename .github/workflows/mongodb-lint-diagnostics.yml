name: MongoDB lint diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Capture lint output
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          status=$?
          cat lint.log
          echo "$status" > lint-status.txt
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: mongodb-lint-diagnostics
          path: |
            lint.log
            lint-status.txt
          retention-days: 1
