name: One-off Home carousel extraction

on:
  push:
    branches:
      - refactor/foundation-stabilization

permissions:
  contents: write

jobs:
  extract-home-carousel:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v4
        with:
          ref: refactor/foundation-stabilization
          fetch-depth: 0

      - name: Extract project carousel
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/components/visual-final-candidate/visual-final-candidate.tsx")
          carousel_path = Path("src/components/visual-final-candidate/project-carousel.tsx")
          text = source_path.read_text(encoding="utf-8")

          if carousel_path.exists():
              print("Project carousel already extracted.")
          else:
              start = text.find("function ProjectCarousel(")
              end = text.find("function FirstFold(", start)
              if start == -1 or end == -1:
                  raise RuntimeError("Could not locate ProjectCarousel block")

              block = text[start:end].rstrip()
              block = block.replace("function ProjectCarousel(", "export function ProjectCarousel(", 1)

              carousel_content = f'''"use client";

import type {{ CSSProperties, TouchEvent }} from "react";
import {{ useEffect, useRef, useState }} from "react";
import Link from "next/link";

import {{ homeCopy as copy }} from "@/content/home-copy";
import {{ homeProjects as projects }} from "@/content/home-projects";
import type {{ Locale }} from "@/types/portfolio";

import {{ ProjectIcon, StackLogo }} from "./home-icons";
import styles from "./visual-final-candidate.module.css";

type StyleVars = CSSProperties & Record<`--${{string}}`, string | number>;

const AUTO_MS = 7000;
const FIRST_AUTO_MS = 30000;

{block}
'''
              carousel_path.write_text(carousel_content, encoding="utf-8")

              text = text[:start] + text[end:]
              text = text.replace("\nconst AUTO_MS = 7000;\nconst FIRST_AUTO_MS = 30000;\n", "\n", 1)
              text = text.replace(
                  'import type { CSSProperties, ElementType, MouseEvent, ReactNode, TouchEvent } from "react";',
                  'import type { CSSProperties, ElementType, MouseEvent, ReactNode } from "react";',
                  1,
              )
              marker = 'import type { HomeIconName as IconName } from "./home-icons";\n'
              text = text.replace(marker, marker + 'import { ProjectCarousel } from "./project-carousel";\n', 1)
              source_path.write_text(text, encoding="utf-8")
          PY

      - name: Commit extracted carousel
        run: |
          if git diff --quiet; then
            echo "No extraction changes required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/visual-final-candidate/visual-final-candidate.tsx src/components/visual-final-candidate/project-carousel.tsx
          git commit -m "refactor: extract Home project carousel"
          git push origin HEAD:refactor/foundation-stabilization
