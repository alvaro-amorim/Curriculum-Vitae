name: One-off Home content extraction

on:
  push:
    branches:
      - refactor/foundation-stabilization

permissions:
  contents: write

jobs:
  extract-home-content:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v4
        with:
          ref: refactor/foundation-stabilization
          fetch-depth: 0

      - name: Connect Home component to centralized content
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/components/visual-final-candidate/visual-final-candidate.tsx")
          text = path.read_text(encoding="utf-8")

          if 'import { homeCopy as copy } from "@/content/home-copy";' not in text:
              marker = 'import { profile } from "@/content/profile";\n'
              imports = (
                  'import { homeCopy as copy } from "@/content/home-copy";\n'
                  'import { homeProjects as projects } from "@/content/home-projects";\n'
                  'import type { HomeProjectAccent as Accent, HomeProjectIconKey as ProjectIconKey } from "@/content/home-projects";\n'
              )
              text = text.replace(marker, marker + imports, 1)

          text = text.replace(
              'type ProjectIconKey = "margem" | "comerc" | "gdash" | "sdr" | "arcade" | "portfolio-os";\n',
              '',
              1,
          )
          text = text.replace(
              'type Accent = "blue-purple" | "amber-pink" | "emerald-teal" | "rose-indigo" | "violet-cyan" | "sky-purple";\n',
              '',
              1,
          )

          home_type_start = text.find('type HomeProject = {')
          if home_type_start != -1:
              home_type_end = text.find('\n};', home_type_start)
              if home_type_end == -1:
                  raise RuntimeError('Could not locate HomeProject type end')
              text = text[:home_type_start] + text[home_type_end + 4:]

          copy_start = text.find('const copy = {')
          projects_start = text.find('\n\nconst projects: HomeProject[] = [', copy_start)
          accent_start = text.find('\n\nconst accentGradient:', projects_start)

          if copy_start != -1:
              if projects_start == -1 or accent_start == -1:
                  raise RuntimeError('Could not locate Home content blocks safely')
              text = text[:copy_start] + text[accent_start + 2:]

          text = text.replace('project.carouselStack.length > 4 ? (', 'project.carouselStack.length > 6 ? (')
          text = text.replace('+{project.carouselStack.length - 4}', '+{project.carouselStack.length - 6}')

          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit extracted Home content
        run: |
          if git diff --quiet; then
            echo "No extraction changes required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/visual-final-candidate/visual-final-candidate.tsx
          git commit -m "refactor: connect Home to centralized content"
          git push origin HEAD:refactor/foundation-stabilization
