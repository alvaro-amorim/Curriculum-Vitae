name: Refresh MongoDB lockfile

on:
  push:
    branches:
      - feat/mongodb-migration
    paths:
      - .github/workflows/update-mongodb-lock.yml

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: feat/mongodb-migration

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Refresh package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit updated lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "build: refresh npm lockfile for MongoDB"
          git push origin HEAD:feat/mongodb-migration
