name: Temporary source snapshot

on:
  push:
    branches:
      - refactor/foundation-stabilization

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refactor/foundation-stabilization
      - name: Archive source
        run: git archive --format=zip --output=source-snapshot.zip HEAD
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: current-source-snapshot
          path: source-snapshot.zip
          retention-days: 1
